<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>کترینگ آراکس</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="with-logo">
  <h2 id="page-title" class="page-title"></h2>
  <div id="items-list"></div>
  <a href="menu.html" class="back-button">بازگشت به منو</a>
  <script src="js/data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const type = params.get("type");
    const titleEl = document.getElementById("page-title");
    const listEl = document.getElementById("items-list");
    const category = data[type];
    if (!category) {
      titleEl.innerText = "دسته‌بندی نامعتبر";
    } else {
      titleEl.innerText = category.title;
      if (category.sections) {
        category.sections.forEach(section => {
          const sectionTitle = document.createElement("h3");
          sectionTitle.className = "section-title";
          sectionTitle.innerText = section.subtitle;
          listEl.appendChild(sectionTitle);
          const container = document.createElement("div");
          container.className = "card-grid";
          listEl.appendChild(container);
          section.items.forEach(item => {
            const card = document.createElement("div");
            card.className = "food-card";
            card.innerHTML = `
              <img src="${item.img}" alt="${item.name}" loading="lazy">
              <div class="food-info">
                <h3>${item.name}</h3>
                <p>${item.price}</p>
              </div>
            `;
            container.appendChild(card);
          });
        });
      } else {
        const container = document.createElement("div");
        container.className = "card-grid";
        listEl.appendChild(container);
        category.items.forEach(item => {
          const card = document.createElement("div");
          card.className = "food-card";
          card.innerHTML = `
            <img src="${item.img}" alt="${item.name}">
            <div class="food-info">
              <h3>${item.name}</h3>
              <p>${item.price}</p>
            </div>
          `;
          container.appendChild(card);
        });
      }
    }
  </script>

</body>
</html>
